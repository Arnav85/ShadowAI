version: "3.9"

services:
  # ─── Tier 3: PostgreSQL ───────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: cloudjanitor_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-janitor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-janitor}
      POSTGRES_DB: ${POSTGRES_DB:-cloudjanitor}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-janitor} -d ${POSTGRES_DB:-cloudjanitor}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Tier 2: FastAPI Backend ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cloudjanitor_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-janitor}:${POSTGRES_PASSWORD:-janitor}@db:5432/${POSTGRES_DB:-cloudjanitor}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      APP_ENV: development
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─── Tier 1: Streamlit Frontend ───────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cloudjanitor_frontend
    restart: unless-stopped
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "8501:8501"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
